<!DOCTYPE html>
<html>
<head>
  <title>Flashcards</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav id="navs">
  <p>Flashcards</p>
</nav>

<div class="flashcards-wrapper" style="display:flex; justify-content:center; gap:50px; flex-wrap:wrap; padding: 20px;">
  
  <div class="create-panel" style="background: rgba(255,255,255,0.05); padding: 25px; border-radius: 15px; backdrop-filter: blur(10px); width: 100%; max-width: 450px; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align:center;">
    <h3 style="color:#ffb3e0; margin-top:0; font-size: 24px;">⚡ Quick Flashcard</h3>
    <p style="font-size:12px; color:#cfc3d9;">Format example: <b>What is OS ? An operating system</b></p>
    <form id="createFlashcardForm" style="display:flex; flex-direction:column; gap:15px; margin-top:15px;">
      <textarea id="fcContent" placeholder="Question ? Answer..." rows="3" required style="padding:15px; border-radius:10px; border:1px solid rgba(255,255,255,0.3); background:rgba(0,0,0,0.2); color:white; font-size:15px; resize:none; outline:none; transition:0.3s;"></textarea>
      <button type="submit" style="padding:12px; background:linear-gradient(135deg, #ff66b3, #a36ea1); color:white; border:none; border-radius:25px; font-weight:bold; font-size:16px; cursor:pointer; transition:0.3s; box-shadow: 0 5px 15px rgba(255,102,179,0.3);">Create Card</button>
    </form>
  </div>

  <div class="flashcards-container">
    <h2>Practice</h2>

    <div id="card" class="flashcard">
      <p id="question">Loading...</p>
    </div>

    <button onclick="flipCard()">Flip Card</button>
    <br>
    <button onclick="nextCard()">Next</button>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/flashcards.js"></script>
<script src="../js/main.js"></script>
</body>
</html>
