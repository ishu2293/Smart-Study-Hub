<!DOCTYPE html>
<html>
<head>
  <title>Reset Password</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<nav id="navs">
  <p>Security Panel</p>
</nav>
<div class="loginPage">
  <div class="login">
    <div>
      <i class="fa-solid fa-key"></i>
    </div>
    <div>
      <h1>Reset Password</h1>
    </div>
  </div>

<div class="loginf">
  <form id="resetPasswordForm">
    <p style="color:#cfc3d9; font-size:14px; text-align:center;">Enter your email to verify account and reset credentials.</p>
    <input type="email" id="resetEmail" placeholder="Email Address" required>
    <input type="password" id="newPassword" placeholder="New Password" required>
    <button type="submit">Update Password</button>
    <a href="login.html" style="color:#e0b3ff; text-align:center; display:block; margin-top:20px; text-decoration:none;">Back to Login</a>
  </form>
</div>
</div>

<script src="../js/auth.js"></script>
</body>
</html>
