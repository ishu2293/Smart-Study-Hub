<!DOCTYPE html>
<html>

<head>
  <title>Revision + Quiz</title>
  <link rel="stylesheet" href="../css/style.css">
  <meta charset="UTF-8">
</head>

<body>

  <div class="revision-container">

    <h2>Revision & Quiz Mode</h2>

    <!-- SUBJECT -->
    <select id="subjectSelect">
      <option value="">Select Subject</option>
      <option value="DSA">DSA</option>
      <option value="DBMS">DBMS</option>
      <option value="OS">OS</option>
      <option value="CN">CN</option>
      <option value="SE">SE</option>
      <option value="WAD">WAD</option>
    </select>

    <!-- MODE -->
    <select id="modeSelect">
      <option value="revision">Revision Mode</option>
      <option value="quiz">Quiz Mode</option>
    </select>

    <!-- CONTENT -->
    <div class="flashcard">
      <p id="mainText">Select subject to start</p>
    </div>

    <!-- OPTIONS (ONLY FOR QUIZ) -->
    <div id="optionsContainer"></div>

    <!-- BUTTON -->
    <button onclick="next()">Next</button>

    <!-- PROGRESS -->
    <p id="progressText"></p>

    <!-- RESULT -->
    <h3 id="resultText"></h3>

  </div>

  <script src="../js/api.js"></script>
  <script src="../js/revesion.js"></script>

  <script src="../js/navbar.js"></script>
</body>

</html>
